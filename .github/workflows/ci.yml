name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: typecheck · lint · test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: homegrown
          POSTGRES_PASSWORD: homegrown
          POSTGRES_DB: homegrown
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U homegrown -d homegrown"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Lint
        run: pnpm -r lint

      - name: Test
        env:
          TEST_DATABASE_URL: postgresql://homegrown:homegrown@localhost:5432/homegrown
        run: pnpm -r test
